spring.application.name=invoicing

server.port=8084

# minio configuration
minio.url=${MINIO_URL:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:admin}
minio.secret-key=${MINIO_SECRET_KEY:admin123}
minio.bucket-name=${MINIO_BUCKET_NAME:icompras.invoices}

# kafka configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=icompras.invoicing
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.auto-offset-reset=earliest

kafka.topic.orders.invoiced=icompras.invoiced-orders
kafka.topic.orders.paid=icompras.paid-orders